<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect: stores the real path and redirects to index.html
      // so Vue Router can handle routing client-side
      sessionStorage.redirect = location.href;
      location.replace('/');
    </script>
  </head>
  <body></body>
</html>
